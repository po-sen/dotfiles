name: Test
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {name: 'macOS', os: 'macos-latest'}
          # - {name: 'macOS Ventura', os: 'macos-13'}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Validate Brewfile syntax
        run: ruby -c Brewfile
      - name: Validate managed Brewfiles
        run: |
          set -euxo pipefail

          find brewfiles -type f -name '*.rb' | sort | while IFS= read -r brewfile; do
            ruby -c "$brewfile"
            brew bundle list --file="$brewfile" >/dev/null
          done
      - name: Validate managed tool versions
        run: |
          set -euxo pipefail

          find tool-versions -type f | sort | while IFS= read -r tool_versions_file; do
            awk '
              /^[[:space:]]*($|#)/ { next }
              NF < 2 {
                printf "%s:%d: expected \"<plugin> <version>\"\n", FILENAME, NR > "/dev/stderr"
                exit 1
              }
            ' "$tool_versions_file"
          done
      - name: Validate Make targets
        run: |
          make help
          make -n sync
          make -n update
          make -n teardown
      - name: Smoke test dotfiles lifecycle
        env:
          HOME: ${{ runner.temp }}/dotfiles-home
          DOTFILES_DEVICE_ID: ci-smoke
          BREW_BUNDLE_FLAGS: --force
        run: |
          set -euxo pipefail

          mkdir -p "$HOME"
          rm -f "brewfiles/${DOTFILES_DEVICE_ID}.rb" "tool-versions/${DOTFILES_DEVICE_ID}"

          cat >"tool-versions/${DOTFILES_DEVICE_ID}" <<'EOF'
          golang 1.25.7
          EOF

          DEVICE_BREWFILE="$(ruby -e 'load "./Brewfile"; print ensure_device_brewfile!')"
          DEVICE_TOOL_VERSIONS="$(ruby -e 'load "./Brewfile"; print ensure_device_tool_versions!')"

          make sync

          test -L "$HOME/.bash_profile"
          test -L "$HOME/.gitconfig"
          test -L "$HOME/.zprofile"
          test -L "$HOME/.vimrc"
          test -L "$HOME/.config/nvim/init.vim"
          test -L "$HOME/.tool-versions"
          test -f "$HOME/.vim/autoload/plug.vim"
          test -f "$HOME/.config/nvim/autoload/plug.vim"
          test -f "$DEVICE_BREWFILE"
          test -f "$DEVICE_TOOL_VERSIONS"
          test "$(readlink "$HOME/.tool-versions")" = "$DEVICE_TOOL_VERSIONS"
          grep -F 'brew "asdf"' "$DEVICE_BREWFILE"
          grep -F 'golang 1.25.7' "$DEVICE_TOOL_VERSIONS"

          make update

          test -s "$DEVICE_BREWFILE"
          ruby -c "$DEVICE_BREWFILE"
          grep -F 'brew "asdf"' "$DEVICE_BREWFILE"
          brew bundle list --file="$DEVICE_BREWFILE" >/dev/null

          make teardown

          test ! -e "$HOME/.bash_profile"
          test ! -e "$HOME/.gitconfig"
          test ! -e "$HOME/.zprofile"
          test ! -e "$HOME/.vimrc"
          test ! -e "$HOME/.config/nvim"
          test ! -e "$HOME/.tool-versions"

          rm -f "brewfiles/${DOTFILES_DEVICE_ID}.rb" "tool-versions/${DOTFILES_DEVICE_ID}"
          test -z "$(git status --short)"
